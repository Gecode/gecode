        cmake --build (Join-Path $work "a\build") --config ${{ env.BUILD_TYPE }}

        cmake -S (Join-Path $work "b") -B (Join-Path $work "b\build") -G "Visual Studio 17 2022" -A x64 "-DCMAKE_PREFIX_PATH=$prefix"
